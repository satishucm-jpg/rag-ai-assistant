<!DOCTYPE html>
<html>
<head>
    <title>AI Software Engineer Assistant</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            margin-top: 10px;
        }
        button {
            padding: 10px 20px;
            margin-top: 10px;
            cursor: pointer;
        }
        .response {
            margin-top: 20px;
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
        }
        .snippet {
            background: #020617;
            padding: 10px;
            margin-top: 10px;
            font-family: monospace;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>
<div class="container">
    <h1>🚀 AI Software Engineer Assistant</h1>

    <textarea id="question" placeholder="Ask about the codebase..."></textarea>
    <button onclick="askQuestion()">Ask</button>

    <div id="result" class="response">Waiting for question...</div>
</div>

<script>
async function askQuestion() {
    const question = document.getElementById("question").value;

    if (!question) {
        alert("Please enter a question");
        return;
    }

    document.getElementById("result").innerHTML = "⏳ Loading...";

    try {
        const response = await fetch("https://rag-ai-assistant-81gg.onrender.com/query", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ question: question })
        });

        const data = await response.json();

        console.log(data); // 🔥 DEBUG

        let html = `<h3>Answer:</h3><p>${data.answer}</p>`;

        html += `<h4>Sources:</h4><ul>`;
        data.sources.forEach(s => {
            html += `<li>${s}</li>`;
        });
        html += `</ul>`;

        if (data.snippets) {
            html += `<h4>Code Snippets:</h4>`;
            data.snippets.forEach(snippet => {
                html += `<div class="snippet">${snippet}</div>`;
            });
        }

        document.getElementById("result").innerHTML = html;

    } catch (error) {
        console.error(error);
        document.getElementById("result").innerHTML = "❌ Error connecting to backend";
    }
}
</script>

</body>
</html>
